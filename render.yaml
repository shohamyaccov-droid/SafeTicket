# SafeTicket - Render Blueprint (Infrastructure as Code)
# https://render.com/docs/blueprint-spec

databases:
  - name: safeticket-db
    databaseName: safeticket
    plan: free

services:
  # Django Backend (API)
  - type: web
    name: safeticket-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py migrate --noinput && python manage.py seed_israeli_data && python manage.py collectstatic --noinput
    # Seed DB (artists/events/qa_bot) then promote admins, then serve.
    startCommand: python seed_production.py && python fix_admin.py && gunicorn safeticket.wsgi --bind 0.0.0.0:$PORT --workers 1 --worker-class gthread --threads 2 --timeout 90
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: safeticket-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "safeticket-api.onrender.com,localhost,127.0.0.1"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      # Set to true only while testing uploads; uses looser PDF MIME + PyPDF + fallbacks (see settings.RELAX_PDF_UPLOAD_VALIDATION).
      - key: RELAX_PDF_UPLOAD_VALIDATION
        value: "false"
      # Media (PDFs, images): paste from Cloudinary dashboard — enables persistent storage vs ephemeral disk.
      - key: CLOUDINARY_URL
        sync: false

  # React Frontend (Static Site)
  - type: web
    name: safeticket-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # Public API origin; vite build bakes this in. Override in dashboard if you use a custom domain.
      - key: VITE_API_URL
        value: https://safeticket-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
