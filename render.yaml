# SafeTicket - Render Blueprint (Infrastructure as Code)
# https://render.com/docs/blueprint-spec

databases:
  - name: safeticket-db
    databaseName: safeticket
    plan: free

services:
  # Django Backend (API)
  - type: web
    name: safeticket-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py migrate --noinput && python manage.py collectstatic --noinput
    # TEMPORARY: run fix_admin.py once, then revert to gunicorn-only (see backend/fix_admin.py).
    startCommand: python fix_admin.py && gunicorn safeticket.wsgi --bind 0.0.0.0:$PORT --workers 1 --worker-class gthread --threads 2 --timeout 90
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: safeticket-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "safeticket-api.onrender.com,localhost,127.0.0.1"
      - key: CORS_ALLOWED_ORIGINS
        sync: false

  # React Frontend (Static Site)
  - type: web
    name: safeticket-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
